# Minimal BiocManager config stub for Scenario G testing.
# Provides a syntactically valid BIOCONDUCTOR_CONFIG_FILE that points
# all Bioc repo classes at PPM, which is reachable in the test container.
# This is not a real Bioconductor config — it is used only to test
# whether providing a reachable config file changes renv/BiocManager behaviour.
repos_base_url: https://packagemanager.posit.co
BiocVersion: "3.20"
r_ver_for_bioc_ver:
  "3.20": "4.4"
bioc_ver_for_r_ver:
  "4.4": "3.20"
release_version: "3.20"
devel_version: "3.21"
repositories:
  - name: BioCsoft
    url: https://packagemanager.posit.co
  - name: BioCann
    url: https://packagemanager.posit.co
  - name: BioCexp
    url: https://packagemanager.posit.co
  - name: BioCworkflows
    url: https://packagemanager.posit.co
